<!DOCTYPE html>
<html>
<head>
    <title>Gallery - Ritik Verma</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        h1 {
            text-align: center;
            margin: 80px 0;
            color: #00f7ff;
        }

        .gallery {
            padding: 0 10%;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 150px;
            opacity: 0;
            transform: translateX(100px);
            transition: all 1s ease;
        }

        .row.reverse {
            flex-direction: row-reverse;
            transform: translateX(-100px);
        }

        .row.show {
            opacity: 1;
            transform: translateX(0);
        }

        .text {
            width: 45%;
        }

        .text h2 {
            color: #00f7ff;
            margin-bottom: 15px;
        }

        .text p {
            color: #cbd5e1;
            line-height: 1.6;
        }

        .image {
            width: 45%;
        }

        .dummy-img {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #00f7ff, #007acc);
            border-radius: 12px;
        }

        /* Just to ensure scroll exists */
        body::after {
            content: "";
            display: block;
            height: 200px;
        }
        /* ===== NAVBAR ===== */

.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #0f172a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    box-sizing: border-box;   /* IMPORTANT */
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
}

.nav-pic {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: 2px solid #00f7ff;
}

.menu-btn {
    font-size: 30px;
    cursor: pointer;
    color: #00f7ff;
    z-index: 1100;
}

/* ===== SIDEBAR ===== */

.sidebar {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background: #111827;
    padding-top: 100px;
    transition: 0.4s ease;
    z-index: 1001;
}

.sidebar a {
    display: block;
    padding: 15px 30px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover,
.sidebar a.active {
    background: #00f7ff;
    color: black;
}

.sidebar.show {
    right: 0;
}

/* Overlay */

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
    display: none;
    z-index: 1000;
}

.overlay.show {
    display: block;
}
body {
    padding-top: 80px;
}
.image {
    width: 45%;
    overflow: hidden;
    border-radius: 12px;
}

.image img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 12px;
    transition: transform 0.5s ease;
}

.image:hover img {
    transform: scale(1.08);
}
    </style>
</head>
<!-- TOP BAR -->
<div class="top-bar">
    <div class="logo">
        <img src="images/main.png" class="nav-pic">
        <span>Ritik Verma</span>
    </div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="/" id="nav-home">Home</a>
    <a href="/coding.html" id="nav-coding">Compiler</a>
    <a href="/projects.html" id="nav-projects">Projects</a>
    <a href="/gallery.html" id="nav-gallery">Gallery</a>
    <a href="/contact.html" id="nav-contact">Contact us</a>
    
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<body>

<h1>My Gallery</h1>

<section class="gallery">

    <!-- Section 1 -->
    <div class="row">
        <div class="text">
            <h2>ITS ME </h2>
            <p>Ritik verma</p>
        </div>
        <div class="image">
            <img src="images/img1.png" alt="Project 1">
        </div>
    </div>

    <!-- Section 2 -->
    <div class="row reverse">
        <div class="text">
            <h2>PSIT </h2>
            <p>In elevate 2k26 at PSIT ground.</p>
        </div>
        <div class="image">
            <img src="images/img2.png" alt="Project 2">
        </div>
    </div>

</section>

<script>
    function reveal() {
        const rows = document.querySelectorAll(".row");

        rows.forEach(row => {
            const rect = row.getBoundingClientRect();
            if (rect.top < window.innerHeight - 100) {
                row.classList.add("show");
            }
        });
    }

    window.addEventListener("scroll", reveal);
    window.addEventListener("load", reveal);
    function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("show");
    document.getElementById("overlay").classList.toggle("show");
}
</script>

</body>
</html>
