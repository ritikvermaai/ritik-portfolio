<body>

<!-- Hamburger -->

<div class="sidebar" id="sidebar">

</div>

<h1>Saved Projects 📂</h1>

<div id="projectList"></div>



<script src="/script.js"></script>

<script>
async function loadProjects(){
    const res = await fetch("/projects");
    const projects = await res.json();

    const container = document.getElementById("projectList");
    container.innerHTML = "";

    projects.forEach(p => {
        const div = document.createElement("div");
        div.classList.add("project-card");

        div.innerHTML = `
            <h3>${p.title}</h3>
            <button class="open-btn" onclick="openProject('${p.title}','${p.language}')">Open</button>
            <button class="download-btn" onclick="downloadProject('${p.title}','${p.language}')">Download</button>
            <button class="delete-btn" onclick="deleteProject('${p.title}','${p.language}')">Delete</button>
        `;

        container.appendChild(div);
    });
}

function downloadProject(title, lang){
    window.location.href = `/download/${title}/${lang}`;
}

function openProject(title, lang){
    fetch(`/download/${title}/${lang}`)
    .then(res => res.text())
    .then(code => {
        localStorage.setItem("openedCode", code);
        localStorage.setItem("openedLang", lang);
        window.location.href = "/coding.html";
    });
}

async function deleteProject(title, lang){

    const password = prompt("Enter Admin Password:");

    if(!password) return;

    const response = await fetch(`/delete/${title}/${lang}`, {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ password })
    });

    const data = await response.json();

    if(response.status === 403){
        alert("Wrong Password!");
        return;
    }

    if(response.status === 404){
        alert("File Not Found!");
        return;
    }

    alert("Deleted Successfully!");
    loadProjects();
}

loadProjects();
</script>

</body>
