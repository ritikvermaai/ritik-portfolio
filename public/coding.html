<!DOCTYPE html>
<html>
<head>
    <title>Ritik C/C++ Compiler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<style> /* Hamburger */
        .menu-btn{
            position:fixed;
            top:20px;
            right:20px;
            font-size:28px;
            cursor:pointer;
            z-index:1100;
            color:white;
        }

        .sidebar{
            position:fixed;
            top:0;
            right:-270px;
            width:250px;
            height:100%;
            background:#111827;
            padding:60px 20px;
            transition:0.4s ease;
            z-index:1050;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            margin:20px 0;
            font-size:18px;
        }

        .sidebar.active{
            right:0;
        }
        .sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:20px 0;
    font-size:18px;
    transition:0.3s;
}

.sidebar a:hover{
    color:#00f7ff;
}

.sidebar a.active{
    color:#00f7ff;
    font-weight:600;
}
         /* Top bar */
.top-bar{
    position:fixed;
    top:0;
    left:-19px;
    width:100%;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    background:#0f172a;
    z-index:3000;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    font-size:18px;
}

.brand img{
    width:35px;
    height:35px;
    border-radius:50%;
    border:2px solid #b8b8b8;
}
.menu-btn{
    background:none;
    border:none;
    font-size:28px;
    color:#12c3c3;
    cursor:pointer;
    display:block;
}
body{
    padding-top:80px;
}
        </style>
<h1>Ritik Verma - Online Compiler 🚀</h1>
<!-- Hamburger -->
<div class="top-bar">
    <div class="brand">
        <img src="images/main.png">
        <span>Ritik Verma</span>
    </div>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div class="sidebar" id="sidebar">
    <a href="/" id="nav-home">Home</a>
    <a href="/coding.html" id="nav-coding">Compiler</a>
    <a href="/projects.html" id="nav-projects">Projects</a>
    <a href="/gallery.html" id="nav-gallery">Gallery</a>
    <a href="/contact.html" id="nav-contact us">Contact us</a>
    
</div>

<div class="container">

    <label>Select Language:</label>
    <select id="language">
        <option value="c">C</option>
        <option value="cpp">C++</option>
    </select>
     <div class="editor-container">
    <div id="lineNumbers"></div>
    <textarea id="code"></textarea>
</div>

    <div class="buttons">
        <button id="runBtn" onclick="runCode()">
    <span id="runText">Run</span>
    <span id="runLoader" class="loader"></span>
</button>
        <button onclick="saveCode()">Save Project</button>
    </div>
    
    <div class="input-box">
    <label>Program Input:</label>
    <textarea id="userInput" placeholder="Enter input for your program..."></textarea>
</div>

    <div class="terminal">
    <div class="terminal-header">
        TERMINAL
    </div>
    <pre id="output"></pre>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
